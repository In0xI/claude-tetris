<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <button id="theme-toggle" class="theme-toggle" title="Cambiar tema" aria-label="Cambiar tema claro/oscuro">🌙</button>
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="start-overlay" class="overlay">
      <div class="overlay-box">
        <p class="start-title">TETRIS</p>
        <div class="highscores-block">
          <span class="label">TOP 5</span>
          <ol id="start-highscores" class="highscore-list"></ol>
        </div>
        <div class="stats-row">
          <div class="stats-block">
            <span class="label">MEJOR COMBO</span>
            <span class="value" id="start-best-combo">0</span>
          </div>
          <div class="stats-block">
            <span class="label">MÁS LÍNEAS</span>
            <span class="value" id="start-max-lines">0</span>
          </div>
        </div>
        <button id="play-btn">Jugar</button>
        <button id="reset-scores-btn" class="secondary-btn">Resetear records</button>
      </div>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <div id="name-entry" class="name-entry hidden">
          <input id="name-input" type="text" maxlength="12" placeholder="Tu nombre" autocomplete="off" />
          <button id="confirm-name-btn">Guardar</button>
        </div>
        <div class="highscores-block">
          <span class="label">TOP 5</span>
          <ol id="overlay-highscores" class="highscore-list"></ol>
        </div>
        <div class="stats-row">
          <div class="stats-block">
            <span class="label">MEJOR COMBO</span>
            <span class="value" id="overlay-best-combo">0</span>
          </div>
          <div class="stats-block">
            <span class="label">MÁS LÍNEAS</span>
            <span class="value" id="overlay-max-lines">0</span>
          </div>
        </div>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
